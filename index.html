<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSAG AI Call System</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #050b16 0%, #091224 100%);
      color: #ffffff;
      min-height: 100vh;
      padding: 18px;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      background: rgba(14, 22, 40, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
