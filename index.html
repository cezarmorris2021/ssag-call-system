<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSAG Call Command Center</title><style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:#fff;
}

.container {
  padding:15px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:15px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
}

.green{background:#00e676;color:#000;}
.blue{background:#2196f3;color:#fff;}
.orange{background:#ff9800;color:#000;}
.red{background:#e53935;color:#fff;}
.gray{background:#555;color:#fff;}

.status{
  padding:10px;
  margin-top:10px;
  background:#1f2937;
  border-radius:10px;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

</style></head><body>
<div class="container"><h2>SSAG AI Call System</h2><input id="name" placeholder="Lead Name">
<input id="phone" placeholder="Phone Number">
<input id="company" placeholder="Company">
<textarea id="notes" placeholder="Notes"></textarea><button class="green" onclick="dial()">ONE-TAP DIAL</button> <button class="blue" onclick="saveLead('Interested')">SAVE LEAD</button> <button class="orange" onclick="saveLead('Callback')">SAVE AS CALLBACK</button> <button class="gray" onclick="loadNext()">LOAD NEXT LEAD</button> <button class="red" onclick="clearForm()">CLEAR FORM</button>

<div class="status" id="status">Ready</div><div class="card">
<h3>On-Screen Script</h3>
<p id="scriptBox">Tap dial to load script.</p>
<button class="blue" onclick="loadScript()">REFRESH SCRIPT</button>
</div><div class="card">
<h3>Export</h3>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="exportJSON()">Export JSON</button>
</div></div><script>
let leads = JSON.parse(localStorage.getItem('ssag_leads')||'[]');
let currentIndex = 0;

function saveLead(result){
  const lead = {
    name:document.getElementById('name').value,
    phone:document.getElementById('phone').value,
    company:document.getElementById('company').value,
    notes:document.getElementById('notes').value,
    result:result,
    date:new Date().toLocaleString()
  };

  leads.push(lead);
  localStorage.setItem('ssag_leads', JSON.stringify(leads));

  document.getElementById('status').innerText = 'Saved locally';

  clearForm();
}

function dial(){
  const phone = document.getElementById('phone').value;
  if(!phone)return;
  window.location.href = 'tel:'+phone;
  loadScript();
}

function clearForm(){
  document.getElementById('name').value='';
  document.getElementById('phone').value='';
  document.getElementById('company').value='';
  document.getElementById('notes').value='';
}

function loadNext(){
  if(leads.length===0)return;
  const lead = leads[currentIndex % leads.length];

  document.getElementById('name').value=lead.name;
  document.getElementById('phone').value=lead.phone;
  document.getElementById('company').value=lead.company;
  document.getElementById('notes').value=lead.notes;

  currentIndex++;
}

function loadScript(){
  document.getElementById('scriptBox').innerText =
  "Hi this is Cezar with SSAG — quick question, are you currently handling your mobile security in-house or outsourcing it?";
}

function exportCSV(){
  let csv = "Name,Phone,Company,Notes,Result,Date\n";
  leads.forEach(l=>{
    csv += `${l.name},${l.phone},${l.company},${l.notes},${l.result},${l.date}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'leads.csv';
  a.click();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(leads)]);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'leads.json';
  a.click();
}

</script></body>
</html>
